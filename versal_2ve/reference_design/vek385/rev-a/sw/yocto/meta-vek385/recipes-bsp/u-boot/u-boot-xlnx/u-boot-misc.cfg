CONFIG_USE_PREBOOT=y
CONFIG_PREBOOT="ufs init 0; run scsi_init;mw 0xF1D61008 1;mw 0xF1090030 1;mw 0xF1D21008 0x1;mw 0xF1A20324 0xF;mw 0xF1A40004 0x2;mw 0xF1A40000 0x2;mw 0xEB410280 0x1;mw 0xEB410284 0x1;mw 0xEB410288 0x1;mw 0xEB41028C 0x1;mw 0xEB410290 0x1;mw 0xEB410294 0x1;mw 0xEB410298 0x1;mw 0xEB41029C 0x1;mw 0xF1060A00 0x1 1"
CONFIG_BOOTCOMMAND="dhcp; \
setenv serverip $dhcp_server_ip; \
ping $serverip && \
tftpboot 0x21000000 Image && \
setenv bootargs 'root=/dev/nfs nfsroot=/home/amd/boot_images/rootfs,nfsvers=3,nolock,tcp rw ip=dhcp' && \
booti 0x21000000 - 0x1000000;"
