# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-vitis-ai"
BBFILE_PATTERN_meta-vitis-ai = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-vitis-ai = "6"

LAYERDEPENDS_meta-vitis-ai = "core"
LAYERSERIES_COMPAT_meta-vitis-ai = "scarthgap"
