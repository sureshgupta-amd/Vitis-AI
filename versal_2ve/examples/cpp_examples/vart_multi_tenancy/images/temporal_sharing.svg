  <text x="152" y="633" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">Col 0–3</text>
  <text x="152" y="655" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">4x4</text>

