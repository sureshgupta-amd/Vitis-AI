  <text x="272" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 4–7</text>
  <text x="272" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="340" y="223" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="392" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 8–11</text>
  <text x="392" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

