  <text x="992" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 28–31</text>
  <text x="992" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="1060" y="223" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="1112" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#9e9e9e">Col 32–35</text>
  <text x="1112" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <!-- Arrow NPU → OFM A -->
