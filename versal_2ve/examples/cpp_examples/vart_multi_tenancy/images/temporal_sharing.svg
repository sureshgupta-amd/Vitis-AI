<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <marker id="arrowDark" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#333"/>
    </marker>
  </defs>

  <rect width="1200" height="880" fill="white"/>

  <!-- Title -->
  <text x="640" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#222">Temporal Sharing</text>

  <!-- Time arrow on the left -->
  <line x1="42" y1="70" x2="42" y2="810" stroke="#333" stroke-width="2.5" marker-end="url(#arrowDark)"/>
  <text x="42" y="850" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Time</text>

  <rect x="18" y="230" width="48" height="28" rx="5" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="42" y="249" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">t1</text>

  <rect x="18" y="600" width="48" height="28" rx="5" fill="#e1bee7" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="42" y="619" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">t2</text>

  <!-- ======== TIME SLOT t1 — Model A ======== -->
  <text x="640" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#555">Time Slot t1  —  Model A</text>

  <!-- Single IFM A -->
  <rect x="105" y="100" width="110" height="40" rx="6" fill="#c8e6c9" stroke="#81c784" stroke-width="1.5"/>
  <text x="160" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">IFM A</text>

  <!-- Arrow IFM A → NPU -->
  <line x1="160" y1="140" x2="160" y2="190" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NPU block t1 -->
  <rect x="85" y="190" width="1095" height="110" rx="14" fill="#fdf6e3" stroke="#ccc" stroke-width="2"/>
  <text x="640" y="213" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">NPU</text>

  <!-- Active column 0–3 (light green) -->
  <rect x="100" y="223" width="105" height="60" rx="8" fill="#c8e6c9" stroke="#66bb6a" stroke-width="2"/>
  <text x="152" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Col 0–3</text>
  <text x="152" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">4x4</text>

