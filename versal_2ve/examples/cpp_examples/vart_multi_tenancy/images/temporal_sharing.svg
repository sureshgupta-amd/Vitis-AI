  <text x="272" y="633" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 4–7</text>
  <text x="272" y="655" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="340" y="608" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="392" y="633" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 8–11</text>
  <text x="392" y="655" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="460" y="608" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="512" y="633" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 12–15</text>
  <text x="512" y="655" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="580" y="608" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="632" y="633" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 16–19</text>
  <text x="632" y="655" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="700" y="608" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="752" y="633" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 20–23</text>
  <text x="752" y="655" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="820" y="608" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="872" y="633" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 24–27</text>
  <text x="872" y="655" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="940" y="608" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="992" y="633" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 28–31</text>
  <text x="992" y="655" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="1060" y="608" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="1112" y="633" text-anchor="middle" font-size="11" font-weight="bold" fill="#9e9e9e">Col 32–35</text>
  <text x="1112" y="655" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <!-- Arrow NPU → OFM B -->
  <line x1="160" y1="685" x2="160" y2="725" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Single OFM B -->
  <rect x="105" y="730" width="110" height="40" rx="6" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="160" y="756" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">OFM B</text>

  <!-- Subtitle -->
  <text x="640" y="810" text-anchor="middle" font-size="13" fill="#666">Models take turns on the same NPU columns — one runs at a time.</text>
  <text x="640" y="832" text-anchor="middle" font-size="13" fill="#666">aie_columns_sharing = true, start_column is identical for both models.</text>
</svg>
