<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <rect width="1200" height="620" fill="white"/>

  <!-- Title -->
  <text x="640" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#222">Combined Spatial + Temporal Sharing</text>

  <!-- ======== IFM row ======== -->
  <!-- IFM A above Col 0–3 (temporal group) -->
  <rect x="80" y="70" width="90" height="40" rx="6" fill="#c8e6c9" stroke="#81c784" stroke-width="1.5"/>
  <text x="125" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">IFM A</text>

  <!-- IFM B above Col 0–3 (temporal group) -->
  <rect x="180" y="70" width="90" height="40" rx="6" fill="#e1bee7" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="225" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">IFM B</text>

  <!-- IFM C above Col 4–7 (spatial) -->
  <rect x="285" y="70" width="90" height="40" rx="6" fill="#bbdefb" stroke="#90caf9" stroke-width="1.5"/>
  <text x="330" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">IFM C</text>

  <!-- Arrows IFM → NPU -->
  <line x1="125" y1="110" x2="152" y2="160" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="225" y1="110" x2="152" y2="160" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="110" x2="272" y2="160" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ======== NPU block ======== -->
  <rect x="85" y="160" width="1095" height="110" rx="14" fill="#fdf6e3" stroke="#ccc" stroke-width="2"/>
  <text x="640" y="183" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">NPU</text>

  <!-- Active column 0–3 — Model A & B temporal (split green/purple) -->
  <rect x="100" y="193" width="105" height="60" rx="8" fill="#c8e6c9" stroke="#66bb6a" stroke-width="2"/>
  <!-- Purple stripe on right half to indicate time-sharing -->
  <rect x="152" y="193" width="53" height="60" rx="0" fill="#e1bee7" stroke="none" opacity="0.6"/>
  <!-- Right edge rounded -->
  <rect x="100" y="193" width="105" height="60" rx="8" fill="none" stroke="#66bb6a" stroke-width="2"/>
  <text x="152" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Col 0–3</text>
  <text x="152" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">A + B</text>
  <text x="152" y="248" text-anchor="middle" font-size="10" fill="#555">(temporal)</text>

  <!-- Active column 4–7 — Model C exclusive (blue) -->
  <rect x="220" y="193" width="105" height="60" rx="8" fill="#90caf9" stroke="#42a5f5" stroke-width="2"/>
  <text x="272" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Col 4–7</text>
  <text x="272" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Model C</text>
  <text x="272" y="248" text-anchor="middle" font-size="10" fill="#1565c0">(exclusive)</text>

  <!-- Grey unused columns -->
  <rect x="340" y="193" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="392" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 8–11</text>
  <text x="392" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="460" y="193" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="512" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 12–15</text>
  <text x="512" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="580" y="193" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="632" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 16–19</text>
  <text x="632" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="700" y="193" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="752" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 20–23</text>
  <text x="752" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="820" y="193" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="872" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 24–27</text>
  <text x="872" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="940" y="193" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="992" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#9e9e9e">Col 28–31</text>
  <text x="992" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <rect x="1060" y="193" width="105" height="60" rx="8" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="1112" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#9e9e9e">Col 32–35</text>
  <text x="1112" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#9e9e9e">4x4</text>

  <!-- ======== Arrows NPU → OFM ======== -->
  <line x1="152" y1="270" x2="125" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="152" y1="270" x2="225" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="272" y1="270" x2="330" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ======== OFM row ======== -->
  <!-- OFM A -->
  <rect x="80" y="315" width="90" height="40" rx="6" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="125" y="341" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">OFM A</text>

  <!-- OFM B -->
  <rect x="180" y="315" width="90" height="40" rx="6" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="225" y="341" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">OFM B</text>

  <!-- OFM C -->
  <rect x="285" y="315" width="90" height="40" rx="6" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="330" y="341" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">OFM C</text>

  <!-- ======== Legend ======== -->
  <!-- Model A -->
  <rect x="105" y="400" width="20" height="20" rx="4" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="135" y="416" font-size="13" font-weight="bold" fill="#2e7d32">Model A  (start_column = 0, aie_columns_sharing = true)  — temporal group</text>

  <!-- Model B -->
  <rect x="105" y="430" width="20" height="20" rx="4" fill="#e1bee7" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="135" y="446" font-size="13" font-weight="bold" fill="#6a1b9a">Model B  (start_column = 0, aie_columns_sharing = true)  — temporal group</text>

  <!-- Model C -->
  <rect x="105" y="460" width="20" height="20" rx="4" fill="#90caf9" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="135" y="476" font-size="13" font-weight="bold" fill="#1565c0">Model C  (start_column = 4, aie_columns_sharing = false) — spatial / exclusive</text>

  <!-- Grey unused -->
  <rect x="105" y="490" width="20" height="20" rx="4" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="135" y="506" font-size="13" fill="#757575">Unused NPU columns</text>

  <!-- Subtitle -->
  <text x="640" y="560" text-anchor="middle" font-size="13" fill="#666">Model A and Model B time-share columns 0–3 (temporal). Model C runs exclusively on columns 4–7 (spatial).</text>
  <text x="640" y="582" text-anchor="middle" font-size="13" fill="#666">Both sharing modes coexist: the temporal pair swaps on Col 0–3 while Model C runs in parallel on Col 4–7.</text>
</svg>
